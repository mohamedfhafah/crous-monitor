version: '3.8'

services:
  crous-monitor:
    build: .
    container_name: crous-marseille-monitor
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
      # Set Telegram credentials via environment variables (do NOT hardcode them here):
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
